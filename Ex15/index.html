<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lançamento do Produto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Lançamento do Produto</h1>
  <p>Nosso novo produto chega em breve. Não perca!</p>

  <!-- Imagens do produto -->
  <div class="imagens">
    <img src="ec172fdc-9160-416e-a211-dc101612f1b2.png" alt="Foto do produto 1" class="deitado">
    <img src="09d4c28c-f473-42cb-b514-9eb9b5b67611.png" alt="Foto do produto 2" class="frente">
    <img src="77fa8e8d-dc67-43e8-9d3d-13270558874c.png" alt="Foto do produto 3" class="costa">
  </div>

  <!-- Recursos destacados -->
  <h2>Recursos</h2>
  <ul>
    <li>⚡ Muito rápido</li>
    <li>🔒 Seguro</li>
    <li>🎨 Design bonito</li>
  </ul>

  <!-- Contagem regressiva usando a tag <time> -->
  <h2>Faltam:</h2>
  <div class="contagem">
    <div>
      <time id="dias">00</time>
      <p>Dias</p>
    </div>
    <div>
      <time id="horas">00</time>
      <p>Horas</p>
    </div>
    <div>
      <time id="minutos">00</time>
      <p>Minutos</p>
    </div>
    <div>
      <time id="segundos">00</time>
      <p>Segundos</p>
    </div>
  </div>

  <p>Data de lançamento: <time datetime="2026-06-01">01/06/2026</time></p>

  <!-- Formulário de pré-venda -->
  <h2>Formulário de Pré-venda</h2>
  <form id="formulario">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" placeholder="Seu nome" /><br />

    <label for="email">E-mail:</label>
    <input type="email" id="email" placeholder="seu@email.com" /><br />

    <label for="plano">Plano:</label>
    <select id="plano">
      <option value="">Escolha um plano</option>
      <option value="basico">Básico — R$ 99</option>
      <option value="pro">Pro — R$ 199</option>
    </select><br />

    <button type="submit">Garantir meu desconto</button>
    <p id="mensagem"></p>
  </form>

  <script src="script.js"></script>
</body>
</html>
