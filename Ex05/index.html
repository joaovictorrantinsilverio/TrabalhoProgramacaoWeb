<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 05</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>Formulário de contato</h1>

    <form action="#" class="card">
        <div>
            <label for="email">E-mail:</label>
            <input type="text" id="e-mail" name="e-mail_usuario" placeholder="Digite seu e-mail..." required>
        </div>

        <div>
            <label for="senha">Senha:</label>
            <input type="text" id="senha" name="senha_usuario" placeholder="Digite sua senha..." required>
        </div>

        <div>
            <Label for="Mensagem">Mensagem:</Label>
            <textarea name="Mensagem" id="mensagem" rows="10" cols="50" placeholder="Digite sua mensagem..."></textarea>
        </div>

        <div>
            <button class="botao_enviar">Enviar</button>
        </div>
    </form>
    
</body>
</html>
